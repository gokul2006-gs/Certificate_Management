upstream backend_servers {
    # Load balancing configuration
    # Least connections balances load based on active sessions
    least_conn;
    
    server web-backend-1:8000 max_fails=3 fail_timeout=10s;
    server web-backend-2:8000 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name localhost;

    # Gzip settings for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Frontend React Static Files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend servers
    location /api/ {
        proxy_pass http://backend_servers/api/;
        proxy_http_version 1.1;
        
        # Headers for CSRF and Session stability
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for large certificate downloads / polling stability
        proxy_buffering off;
        proxy_read_timeout 150s;
        proxy_connect_timeout 75s;
    }

    # Proxy Django admin / visualizer endpoints
    location /admin/ {
        proxy_pass http://backend_servers/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Media files (uploaded certificates)
    location /media/ {
        proxy_pass http://backend_servers/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Django Static files (admin panels, etc.)
    location /django-static/ {
        proxy_pass http://backend_servers/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
